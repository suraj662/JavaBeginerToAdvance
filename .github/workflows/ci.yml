name: Spring Boot CI

on:
  push:
    branches:
      - master
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SpringBoot/cicd-demo-app

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give execute permission
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build application
        run: ./mvnw clean package
