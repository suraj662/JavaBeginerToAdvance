name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SpringBoot/cicd-demo-app

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build JAR
        run: ./mvnw clean package

      # 🐳 Docker steps
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo-app:latest
