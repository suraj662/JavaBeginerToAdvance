name: Spring Boot CI

on:
  push:
    branches:
      - master
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SpringBoot/cicd-demo-app

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give execute permission
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build application
        run: ./mvnw clean package


        # 🐳 Docker steps
      - name: Login to Docker Hub
        run: echo "${{ secrets.Trex890@# }}" | docker login -u "${{ secrets.suraj00001 }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.suraj00001 }}/cicd-demo-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.suraj00001 }}/cicd-demo-app:latest
